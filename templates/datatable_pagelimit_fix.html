<script>
$(function () {
    var configuredLimit = parseInt({$metroport_list_pagelimit|default:100|intval}, 10);
{literal}
    if (!configuredLimit || configuredLimit <= 0) {
        return;
    }

    function rebuildLengthOptions($select) {
        var values = [];
        $select.find('option').each(function () {
            var v = parseInt($(this).val(), 10);
            if (!isNaN(v)) {
                values.push(v);
            }
        });

        values = values.filter(function (v, i, arr) {
            return arr.indexOf(v) === i;
        });

        values.sort(function (a, b) {
            // Keep "Wszystkie" (-1) at the end of the list.
            if (a === -1) {
                return 1;
            }
            if (b === -1) {
                return -1;
            }
            return a - b;
        });

        $select.empty();
        $.each(values, function (_, v) {
            $select.append($('<option>', { value: v, text: v === -1 ? 'Wszystkie' : v }));
        });
    }

    function applyLimit($table) {
        if (!$.fn.dataTable || !$.fn.dataTable.isDataTable($table)) {
            return false;
        }

        var dt = $table.DataTable();
        var $wrapper = $table.closest('.dataTables_wrapper');
        var $select = $wrapper.find('.dataTables_length select');

        if ($select.length) {
            if ($select.find('option[value="' + configuredLimit + '"]').length === 0) {
                $select.append($('<option>', { value: configuredLimit, text: configuredLimit }));
                rebuildLengthOptions($select);
            } else {
                rebuildLengthOptions($select);
            }
            $select.val(String(configuredLimit));
        }

        dt.page.len(configuredLimit).draw(false);
        return true;
    }

    $('.lms-ui-datatable').each(function () {
        var $table = $(this);

        if (!applyLimit($table)) {
            setTimeout(function () {
                applyLimit($table);
            }, 0);
            setTimeout(function () {
                applyLimit($table);
            }, 250);
            setTimeout(function () {
                applyLimit($table);
            }, 750);
        }
    });
{/literal}
});
</script>
